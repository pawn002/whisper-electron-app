<header class="app-header">
    <span class="material-icons" aria-hidden="true">mic</span>
    <span class="app-title">{{ title }}</span>
</header>

<div class="app-container">
    <div class="tabs">
        <div class="tabs__list" role="tablist">
            <button
                class="tabs__tab"
                role="tab"
                [attr.aria-selected]="activeTab === 0"
                (click)="activeTab = 0"
            >
                Transcription
            </button>
            <button
                class="tabs__tab"
                role="tab"
                [attr.aria-selected]="activeTab === 1"
                (click)="activeTab = 1"
            >
                Models
            </button>
            <button
                class="tabs__tab"
                role="tab"
                [attr.aria-selected]="activeTab === 2"
                (click)="activeTab = 2"
            >
                History
            </button>
        </div>
        <div class="tabs__panels">
            <div role="tabpanel" [hidden]="activeTab !== 0">
                <app-transcription></app-transcription>
            </div>
            <div role="tabpanel" [hidden]="activeTab !== 1">
                <app-model-selector></app-model-selector>
            </div>
            <div role="tabpanel" [hidden]="activeTab !== 2">
                <app-history></app-history>
            </div>
        </div>
    </div>
</div>

<div class="status-bar" *ngIf="systemInfo">
    <span>Platform: {{ systemInfo.platform }}</span>
    <span>•</span>
    <span>Version: {{ systemInfo.version }}</span>
</div>

<div class="toast-container" aria-live="polite" aria-atomic="false">
    <div
        *ngFor="let toast of toastService.toasts$ | async"
        class="toast toast--{{ toast.variant }}"
        [attr.role]="toast.variant === 'warning' || toast.variant === 'error' ? 'alert' : 'status'"
    >
        <svg class="toast__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ng-container *ngIf="toast.variant === 'info'">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </ng-container>
            <ng-container *ngIf="toast.variant === 'success'">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </ng-container>
            <ng-container *ngIf="toast.variant === 'warning'">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </ng-container>
            <ng-container *ngIf="toast.variant === 'error'">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </ng-container>
        </svg>
        <div class="toast__content">
            <p class="toast__message">{{ toast.message }}</p>
        </div>
        <button
            class="toast__dismiss"
            (click)="toastService.dismiss(toast.id)"
            aria-label="Dismiss notification"
        >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
</div>
